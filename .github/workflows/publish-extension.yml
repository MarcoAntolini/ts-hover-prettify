name: Publish Extension
on:
  workflow_dispatch:
  push:
    tags:
      - "vscode-v*"

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm package:extension

      # secrets.* is not valid in step-level `if` (editor + GitHub Actions rules).
      # Pass tokens via env and skip inside the script when unset.
      - name: Publish to VS Marketplace
        working-directory: packages/vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT secret not set — skipping Visual Studio Marketplace publish."
            exit 0
          fi
          VSIX=$(ls build/ts-hover-prettify-vscode-*.vsix)
          set +e
          OUTPUT=$(pnpm exec vsce publish --packagePath "$VSIX" 2>&1)
          EXIT=$?
          set -e
          echo "$OUTPUT"
          if [ "$EXIT" -ne 0 ]; then
            if echo "$OUTPUT" | grep -qi "already exists"; then
              echo "Version already published to VS Marketplace — continuing."
              exit 0
            fi
            exit "$EXIT"
          fi

      - name: Publish to Open VSX
        working-directory: packages/vscode-extension
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "OVSX_PAT secret not set — skipping Open VSX publish."
            exit 0
          fi
          VSIX=$(ls build/ts-hover-prettify-vscode-*.vsix)
          set +e
          OUTPUT=$(pnpm dlx ovsx publish "$VSIX" 2>&1)
          EXIT=$?
          set -e
          echo "$OUTPUT"
          if [ "$EXIT" -ne 0 ]; then
            if echo "$OUTPUT" | grep -qi "already exists"; then
              echo "Version already published to Open VSX — continuing."
              exit 0
            fi
            exit "$EXIT"
          fi
